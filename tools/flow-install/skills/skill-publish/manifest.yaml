name: skill-publish
type: opencode
version: 0.1.0
owner: julian
status: active
blast_radius: high
description: "Publish a skill with approval gates, catalog update, and audit log."
permissions: ["write"]
data_categories: ["none"]
egress: []
invoke: "/skill-publish"
location: tools/flow-install/skills/skill-publish
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - validation_gate
    human:
      - approval_gate
