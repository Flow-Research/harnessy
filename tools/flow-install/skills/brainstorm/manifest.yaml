name: brainstorm
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Collaborative brainstorming facilitator that develops raw ideas into well-defined concepts."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/brainstorm"
location: tools/flow-install/skills/brainstorm
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
