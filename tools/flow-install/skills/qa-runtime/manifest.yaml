name: qa-runtime
type: opencode
version: 0.1.0
install_scope: global
owner: julian
status: experimental
blast_radius: medium
description: "Deterministic QA runtime for parsing regression specs, scanning tests, detecting drift, and generating coverage from a repo-local QA profile."
permissions: [read, write, execute]
data_categories: [none]
egress: []
invoke: "/qa-runtime"
location: tools/flow-install/skills/qa-runtime
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
dependencies:
  - tool: node
    description: "Node.js runtime for the flow-qa CLI"
    check: "node --version"
    required: true
