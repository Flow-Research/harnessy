name: ci-fix
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: high
description: "Iteratively diagnose and fix failing GitHub Actions runs until CI passes or safely escalates."
permissions: [read, write, execute]
data_categories: [none]
egress: [api.github.com, github.com]
invoke: "/ci-fix"
location: tools/flow-install/skills/ci-fix
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - classification_gate
      - fix_verification
    human:
      - escalation_decision
