name: tech-spec-review
type: opencode
version: 0.2.0
owner: julian
status: experimental
blast_radius: medium
description: "Seven-lens engineering review for technical_spec.md files, including an explicit simplicity and architectural fitness gate."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/tech-spec-review"
location: tools/flow-install/skills/tech-spec-review
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - simplicity_gate
      - architecture_fitness
    human:
      - review_approval
