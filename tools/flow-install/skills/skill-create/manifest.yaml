name: skill-create
type: opencode
version: 0.2.0
owner: julian
status: active
blast_radius: low
description: "Scaffold new skills with manifest and catalog entry."
permissions: ["read", "write", "network"]
data_categories: ["none"]
egress: []
invoke: "/skill-create"
location: tools/flow-install/skills/skill-create
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 600
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.15
    max_human_intervention: 0.6
dependencies:
  - python3
traces:
  enabled: true
