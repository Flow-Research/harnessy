name: engineer
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: high
description: "Autonomous full-stack development agent that implements technical specifications with high test coverage."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/engineer"
location: tools/flow-install/skills/engineer
tests:
  smoke: true
  staging: true
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - implementation_coverage
      - test_pass
    human:
      - scope_review
