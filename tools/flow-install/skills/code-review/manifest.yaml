name: code-review
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Expert code reviewer ensuring implementations are simple, requirement-compliant, and architecturally sound."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/code-review"
location: tools/flow-install/skills/code-review
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - simplicity_gate
      - correctness_gate
      - architecture_gate
    human:
      - review_approval
