name: github-issue-create
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Create GitHub issues with structured inputs and optional project-board placement."
permissions: [write]
data_categories: [pii]
egress: [api.github.com, github.com]
invoke: "/github-issue-create"
location: tools/flow-install/skills/github-issue-create

autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
