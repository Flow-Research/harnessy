name: dev-container
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Scaffold and maintain a reusable Docker development container with spec-driven validation across supported base images."
permissions: ["write"]
data_categories: ["none"]
egress: ["docker.io", "ghcr.io"]
invoke: "/dev-container"
location: tools/flow-install/skills/dev-container
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
