name: skill-improve
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: high
description: "Analyze accumulated decision traces for a skill and propose concrete SKILL.md or command doc mutations to address recurring feedback patterns."
permissions: [read, write]
data_categories: [none]
egress: []
invoke: /skill-improve
location: tools/flow-install/skills/skill-improve
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - trace_analysis
      - proposal_generation
    human:
      - improvement_approval
