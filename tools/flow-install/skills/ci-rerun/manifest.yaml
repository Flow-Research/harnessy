name: ci-rerun
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: low
description: "Re-run GitHub Actions workflow runs (full or failed jobs only)."
permissions: [write:actions]
data_categories: [none]
egress: [api.github.com, github.com]
invoke: "/ci-rerun"
location: tools/flow-install/skills/ci-rerun
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 600
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.15
    max_human_intervention: 0.6
traces:
  enabled: true
