name: context-sync
type: opencode
version: 0.4.0
owner: julian
status: beta
blast_radius: high
description: "Safe repo pull/push workflow that targets the repository integration branch, uses deterministic planning, and keeps PRs moving with a bounded autonomous resolution loop."
permissions: [read, write, execute]
data_categories: [credentials]
egress: [github.com, api.github.com]
invoke: "/context-sync"
location: tools/flow-install/skills/context-sync
dependencies:
  - tool: gh
    description: "GitHub CLI for PR operations"
    check: "gh --version"
    install:
      darwin: "brew install gh"
      linux: "sudo apt install gh || conda install gh --channel conda-forge"
      fallback: "https://cli.github.com/"
    auth_check: "gh auth status"
    required: true
  - tool: git
    description: "Git version control"
    check: "git --version"
    required: true
