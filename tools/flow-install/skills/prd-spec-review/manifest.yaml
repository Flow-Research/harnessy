name: prd-spec-review
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Multi-perspective quality review for product_spec.md files."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/prd-spec-review"
location: tools/flow-install/skills/prd-spec-review
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - spec_completeness
      - criteria_testability
    human:
      - review_approval
