name: skill-feedback
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: low
description: "Capture ad-hoc feedback about any skill's behavior, storing it as a decision trace for the skill evolution system."
permissions: [write]
data_categories: [none]
egress: []
invoke: /skill-feedback
location: tools/flow-install/skills/skill-feedback
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 600
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.15
    max_human_intervention: 0.6
