name: tmux-agent-launcher
type: opencode
version: 0.1.3
install_scope: global
owner: julian
status: experimental
blast_radius: medium
description: "Launch Claude, OpenCode, or Codex in a named tmux session from the command line or a skill wrapper."
permissions: [execute]
data_categories: [none]
egress: [none]
invoke: "/tmux-agent-launcher"
location: tools/flow-install/skills/tmux-agent-launcher
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
dependencies:
  - tool: tmux
    description: "Terminal multiplexer for session management"
    check: "tmux -V"
    install:
      darwin: "brew install tmux"
      linux: "sudo apt install tmux"
      fallback: "https://github.com/tmux/tmux"
    required: true
  - tool: python3
    description: "Python 3 for path resolution and JSON encoding"
    check: "python3 --version"
    required: true

traces:
  enabled: true
