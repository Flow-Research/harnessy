name: local-run
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Prepare accurate local run instructions and optional Docker assets for a repository."
permissions: [write]
data_categories: [credentials]
egress: []
invoke: "/local-run"
location: tools/flow-install/skills/local-run
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
