name: skill-validate
type: opencode
version: 0.1.0
owner: julian
status: active
blast_radius: medium
description: "Validate skill manifest, catalog entry, and blast-radius gates."
permissions: ["read"]
data_categories: ["none"]
egress: []
invoke: "/skill-validate"
location: tools/flow-install/skills/skill-validate
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - manifest_check
      - catalog_check
      - blast_radius_gate
