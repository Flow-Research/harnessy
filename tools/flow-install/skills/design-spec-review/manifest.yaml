name: design-spec-review
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Multi-perspective UX/design review for design_spec.md with 5 expert lenses."
permissions: [write]
data_categories: [none]
egress: []
invoke: "/design-spec-review"
location: tools/flow-install/skills/design-spec-review
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - ux_completeness
      - accessibility_compliance
      - implementability
    human:
      - review_approval
