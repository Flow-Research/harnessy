name: ci-watch
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: low
description: "Monitor GitHub Actions workflow runs and report status."
permissions: [read:actions]
data_categories: [none]
egress: [api.github.com, github.com]
invoke: "/ci-watch"
location: tools/flow-install/skills/ci-watch
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 600
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.15
    max_human_intervention: 0.6
traces:
  enabled: true
