name: semver
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Manage semantic versioning with VERSION file + CHANGELOG.md for any codebase."
permissions: [write]
data_categories: [none]
egress: []
invoke: "/semver"
location: tools/flow-install/skills/semver
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
