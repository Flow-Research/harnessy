name: git-commit
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Interactive git commit flow with branch selection and contextual commit messages."
permissions: [read, write, execute]
data_categories: [none]
egress: []
invoke: "/git-commit"
location: tools/flow-install/skills/git-commit
traces:
  enabled: true
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
dependencies:
  - tool: git
    description: "Git version control"
    check: "git --version"
    required: true
