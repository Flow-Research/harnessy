name: goal-agent
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: high
description: "Two-intelligence goal orchestrator: an AI orchestrator decomposes goals into phases and drives a separate Claude Code worker (via -p mode) in a loop until objective verification passes."
python_packages: "PyYAML:yaml"
install_scope: global
permissions: [terminal, filesystem, network]
data_categories: [none]
egress: [api.anthropic.com]
invoke: /goal-agent
location: tools/flow-install/skills/goal-agent
traces:
  enabled: true
  gates:
    quality:
      - goal_analysis
      - phase_verification
      - goal_verification
    human:
      - escalation_review
state:
  - path: ".goal-agent/*/state.json"
    description: "Per-run state: status, iteration, phases, verification history"
  - path: ".goal-agent/*/identity.json"
    description: "Run-scoped orchestrator identity anchor"
  - path: ".goal-agent/*/runtime-policy.json"
    description: "Machine-enforced allowlist for orchestrator actions"
  - path: ".goal-agent/*/plan.md"
    description: "Phase decomposition plan generated by orchestrator"
  - path: ".goal-agent/*/report.md"
    description: "Completion report with results and metrics"
  - path: ".goal-agent/.learning/registry.json"
    description: "Aggregated cross-run learning recommendations"
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  learning_extraction_interval: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
dependencies:
  - tool: claude
    description: "Claude Code CLI for worker sessions"
    check: "claude --version"
    required: true
  - tool: tmux
    description: "Terminal multiplexer for background orchestration"
    check: "tmux -V"
    required: false
  - tool: python3
    description: "Python 3 for setup script"
    check: "python3 --version"
    required: true
