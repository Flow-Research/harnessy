name: design-mockup
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Generate a working UI prototype from design spec and tech spec with dummy data for visual validation before full implementation."
permissions: [write]
data_categories: []
egress: []
invoke: "/design-mockup"
location: tools/flow-install/skills/design-mockup
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - framework_detection
      - spec_parsing
    human:
      - mockup_review
