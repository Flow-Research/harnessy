name: qa-feature-catalog
type: opencode
version: 0.2.0
owner: julian
status: experimental
blast_radius: low
description: "Semantic QA feature catalog maintenance for Harnessy-compatible repositories: consolidate prefixes, slugs, generated catalogs, overrides, run-result snapshots, and optional result sinks."
permissions: [read-regression-spec, read-test-files, write-qa-metadata]
data_categories: [source_code, test_metadata]
egress: []
invoke: /qa-feature-catalog
location: tools/flow-install/skills/qa-feature-catalog
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 600
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - catalog_alignment
      - prefix_stability
      - generated_artifact_boundary
