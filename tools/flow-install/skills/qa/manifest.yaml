name: qa
type: opencode
version: 0.1.0
owner: julian
status: experimental
blast_radius: medium
description: "Quality Assurance agent for test execution, coverage analysis, bug identification, and browser-QA delegation."
permissions: [write]
data_categories: [pii]
egress: []
invoke: "/qa"
location: tools/flow-install/skills/qa
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1200
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
