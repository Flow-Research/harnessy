name: browser-qa
type: opencode
version: 0.2.2
owner: julian
status: experimental
blast_radius: high
description: "Playwright-based browser QA skill for guided setup, auth handoff, scripted runs, and artifact capture across Flow-compatible repositories."
permissions: [read, write, execute]
data_categories: [credentials, pii]
egress: []
invoke: "/browser-qa"
location: tools/flow-install/skills/browser-qa
autoresearch:
  enabled: true
  metric_layer: 1
  time_budget_seconds: 1800
  evaluation_window: 3
  constraints:
    max_regression_rate: 0.1
    max_human_intervention: 0.5
traces:
  enabled: true
  gates:
    quality:
      - playwright_readiness
      - auth_verification
    human:
      - safety_mode_approval
