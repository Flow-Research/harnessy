name = "harnessy-skill-registry"
main = "src/index.mjs"
compatibility_date = "2026-04-01"

# Artifacts binding — RECONCILE against current Cloudflare Artifacts docs.
# The exact stanza key (`[[artifacts]]`), the binding name, and the namespace
# field are best-guess based on the patterns used by KV/R2/D1. If wrangler
# rejects this, check https://developers.cloudflare.com/workers/runtime-apis/bindings/
# for the canonical syntax and update accordingly.
[[artifacts]]
binding = "ARTIFACTS"
namespace = "flow-skills"

# PUBLISH_TOKEN goes in .dev.vars locally and is set via
# `wrangler secret put PUBLISH_TOKEN` for deployed environments.
